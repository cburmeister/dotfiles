# Enumerate windows using 1 based indexing
set -g base-index 1

# Renumerate windows when one is closed
set -g renumber-windows on

# Screen like
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Pane navigation
unbind-key l
bind-key L last-window
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane resizing
bind-key M-h resize-pane -L
bind-key M-j resize-pane -D
bind-key M-k resize-pane -U
bind-key M-l resize-pane -R
bind-key C-h resize-pane -L 5
bind-key C-j resize-pane -D 5
bind-key C-k resize-pane -U 5
bind-key C-l resize-pane -R 5

# Split panes with | and -
bind-key | split-window -h
bind-key - split-window -v

# Reload config with `r`
bind-key r source-file ~/.tmux.conf

# Left align status bar
set -g status-justify left

# Synchronize panes
bind-key = set -g synchronize-panes

# Copy and paste within tmux using vi-style bind-keyings
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Easier swapping between panes
setw -g pane-base-index 1

# Optimized for Ghostty + M5 GPU
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Status bar background (transparent to use Terminal.app color)
set -g status-style 'bg=default'

# Left side: Green Session Name (matches your C-a prefix vibe)
set -g status-left "#[fg=#a6e3a1,bold] #S #[fg=#45475a]| "

# Right side: Pink/Mauve Clock (minimal)
set -g status-right "#[fg=#f5c2e7] %H:%M "

# Active Window: Blue with Bold Text
setw -g window-status-current-style 'fg=#89b4fa,bold'
setw -g window-status-current-format ' #I:#W '

# Inactive Windows: Subtle Grey
setw -g window-status-style 'fg=#6c7086'
setw -g window-status-format ' #I:#W '

# Pane Borders: Match the theme
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# Message text (e.g. when you hit r to reload)
set -g message-style 'fg=#f5c2e7,bg=#313244,bold'

# Listen for bells
set -g monitor-bell on

# Prevent a global screen flash message; just highlight the tab
set -g visual-bell off

set -g window-status-bell-style "fg=red,bg=default,blink"
